<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SENCIFLIXER – Generador de Sensibilidades</title>
<style>
body {
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #2a2a3c);
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    min-height: 100vh;
}
h1 { color: #ff4d4d; font-size: 32px; margin-bottom:5px; text-align:center;}
h2 { color: #ff9999; margin-bottom: 20px; text-align:center;}
input, select, button { padding: 10px; margin: 5px; border-radius: 8px; border: none; font-size:16px; width: 100%; max-width: 300px; }
button { background-color:#ff4d4d; color:white; cursor:pointer; transition:0.3s; }
button:hover { background-color:#ff1a1a; }
#authArea { margin-top:50px; text-align:center; }
#mainContent { display:none; width:100%; max-width:400px; }
#resultArea { margin-top:20px; padding:20px; background-color:#3a3a5a; border-radius:12px; text-align:left; }
span.sensi-value { font-weight:bold; color:#ffcc00; }
footer { margin-top:30px; font-size:12px; color:#aaa; text-align:center;}
</style>
</head>
<body>

<!-- Login -->
<div id="authArea">
    <h1>Acceso SENCIFLIXER</h1>
    <input type="text" id="username" placeholder="Usuario"><br>
    <input type="password" id="password" placeholder="Clave"><br>
    <button onclick="checkLogin()">Entrar</button>
    <p id="errorMsg" style="color:red; display:none;">Usuario o clave incorrecta</p>
</div>

<!-- Contenido principal -->
<div id="mainContent">
    <h1>SENCIFLIXER</h1>
    <h2>Generador de sensibilidades profesional</h2>

    <label>Marca del celular:</label>
    <select id="brandSelect">
        <option value="">Cargando marcas...</option>
    </select>

    <label>Modelo del celular:</label>
    <select id="modelSelect">
        <option value="">Selecciona el modelo</option>
    </select>

    <label>Estilo de juego:</label>
    <select id="playStyle">
        <option value="sniper">Sniper</option>
        <option value="support">Support</option>
        <option value="competitive">Competitive</option>
    </select>

    <label>Ajuste general (+/-):</label>
    <input type="number" id="btnAdjust" value="0" min="-50" max="50">

    <button onclick="calculateSens()">Generar Senci</button>

    <div id="resultArea" style="display:none;">
        <p>Marca: <span id="resBrand"></span></p>
        <p>Modelo: <span id="resModel"></span></p>
        <p>General: <span id="sensiGeneral" class="sensi-value"></span></p>
        <p>Mira de punto rojo: <span id="sensiAim" class="sensi-value"></span></p>
        <p>Mira X2: <span id="sensi2x" class="sensi-value"></span></p>
        <p>Mira X4: <span id="sensi4x" class="sensi-value"></span></p>
        <p>Mira francotirador: <span id="sensi8x" class="sensi-value"></span></p>
        <p>Cámara 360°: <span id="sensi360" class="sensi-value"></span></p>
    </div>

    <button onclick="exportConfig()">Exportar Configuración</button>
</div>

<footer>
    Desarrollado por @nexus.sensix
</footer>

<script>
// Login
function checkLogin() {
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    if(user === '22' && pass === '22') {
        document.getElementById('authArea').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
    } else {
        document.getElementById('errorMsg').style.display = 'block';
    }
}

// Datos precisos de sensibilidades por dispositivo
const deviceData = {
    "Samsung": {"Galaxy S23":{general:98,aim:105,x2:160,x4:130,sniper:100,cam360:75},"Galaxy A53":{general:100,aim:106,x2:162,x4:132,sniper:102,cam360:76},"Galaxy A22":{general:102,aim:108,x2:165,x4:135,sniper:104,cam360:78}},
    "Apple": {"iPhone 14":{general:95,aim:102,x2:155,x4:128,sniper:98,cam360:72},"iPhone 14 Pro":{general:97,aim:104,x2:158,x4:130,sniper:100,cam360:74},"iPhone 13":{general:94,aim:101,x2:154,x4:127,sniper:97,cam360:71}},
    "Motorola": {"G20":{general:99,aim:106,x2:160,x4:132,sniper:101,cam360:75},"Edge 30":{general:101,aim:108,x2:164,x4:134,sniper:103,cam360:77},"G60":{general:100,aim:107,x2:162,x4:133,sniper:102,cam360:76}},
    "Xiaomi": {"Redmi Note 11":{general:103,aim:109,x2:166,x4:136,sniper:105,cam360:78},"Mi 12":{general:101,aim:107,x2:163,x4:134,sniper:103,cam360:76},"Redmi Note 10":{general:102,aim:108,x2:164,x4:135,sniper:104,cam360:77}},
    "Huawei": {"P50":{general:97,aim:103,x2:157,x4:129,sniper:99,cam360:73},"Mate 40":{general:98,aim:104,x2:158,x4:130,sniper:100,cam360:74}},
    "Oppo": {"Reno 8":{general:99,aim:105,x2:161,x4:131,sniper:101,cam360:75},"Find X5":{general:100,aim:106,x2:163,x4:133,sniper:102,cam360:76}},
    "Vivo": {"V23":{general:100,aim:107,x2:163,x4:133,sniper:102,cam360:76},"X80 Pro":{general:102,aim:109,x2:165,x4:135,sniper:104,cam360:78}},
    "OnePlus": {"10 Pro":{general:101,aim:108,x2:164,x4:134,sniper:103,cam360:77},"Nord 2":{general:99,aim:106,x2:161,x4:132,sniper:101,cam360:75}},
    "Realme": {"GT 2":{general:100,aim:107,x2:163,x4:133,sniper:102,cam360:76},"Narzo 50":{general:99,aim:106,x2:161,x4:132,sniper:101,cam360:75}},
    "Nokia": {"G21":{general:98,aim:104,x2:158,x4:130,sniper:100,cam360:74},"X20":{general:99,aim:106,x2:160,x4:132,sniper:101,cam360:75}},
    "LG": {"Velvet":{general:97,aim:103,x2:157,x4:129,sniper:99,cam360:73},"Wing":{general:98,aim:104,x2:158,x4:130,sniper:100,cam360:74}},
    "Sony": {"Xperia 1":{general:101,aim:108,x2:164,x4:134,sniper:103,cam360:77},"Xperia 5":{general:99,aim:106,x2:161,x4:132,sniper:101,cam360:75}},
    "Asus": {"ROG Phone 6":{general:102,aim:109,x2:165,x4:135,sniper:104,cam360:78},"Zenfone 9":{general:100,aim:107,x2:163,x4:133,sniper:102,cam360:76}},
    "Lenovo": {"Legion Phone Duel 2":{general:101,aim:108,x2:164,x4:134,sniper:103,cam360:77},"K12":{general:98,aim:104,x2:158,x4:130,sniper:100,cam360:74}},
    "ZTE": {"Axon 30":{general:100,aim:107,x2:163,x4:133,sniper:102,cam360:76},"Blade V30":{general:99,aim:106,x2:161,x4:132,sniper:101,cam360:75}},
    "Alcatel": {"1S":{general:96,aim:102,x2:155,x4:128,sniper:97,cam360:72},"3L":{general:97,aim:103,x2:157,x4:129,sniper:99,cam360:73}},
    "Meizu": {"18s":{general:100,aim:107,x2:163,x4:133,sniper:102,cam360:76},"M16th":{general:99,aim:106,x2:161,x4:132,sniper:101,cam360:75}},
    "Honor": {"50":{general:98,aim:104,x2:158,x4:130,sniper:100,cam360:74},"Magic4":{general:99,aim:106,x2:160,x4:132,sniper:101,cam360:75}},
    "HTC": {"Desire 22":{general:97,aim:103,x2:157,x4:129,sniper:99,cam360:73},"U20":{general:98,aim:104,x2:158,x4:130,sniper:100,cam360:74}},
    "Google": {"Pixel 7":{general:101,aim:108,x2:164,x4:134,sniper:103,cam360:77},"Pixel 6":{general:99,aim:106,x2:161,x4:132,sniper:101,cam360:75}}
};

// Llenar marcas
const brandSelect = document.getElementById('brandSelect');
const modelSelect = document.getElementById('modelSelect');
brandSelect.innerHTML = '<option value="">Selecciona la marca</option>';
Object.keys(deviceData).forEach(brand => {
    const opt = document.createElement('option');
    opt.value = brand;
    opt.textContent = brand;
    brandSelect.appendChild(opt);
});

// Llenar modelos según marca
brandSelect.addEventListener('change', () => {
    const brand = brandSelect.value;
    modelSelect.innerHTML = '<option value="">Selecciona el modelo</option>';
    if(deviceData[brand]) {
        Object.keys(deviceData[brand]).forEach(model => {
            const opt = document.createElement('option');
            opt.value = model;
            opt.textContent = model;
            modelSelect.appendChild(opt);
        });
    }
});

// Generar sensibilidades precisas
function calculateSens() {
    const brand = brandSelect.value;
    const model = modelSelect.value;
    const btnAdjust = parseInt(document.getElementById('btnAdjust').value) || 0;
    const style = document.getElementById('playStyle').value;

    if(!brand || !model) { alert("Selecciona marca y modelo"); return; }

    let data = deviceData[brand][model];

    // Ajuste por estilo
    let factor = 0;
    if(style === 'sniper') factor = -2;
    if(style === 'support') factor = +1;
    if(style === 'competitive') factor = +3;

    // Aplicar ajuste y limitar a 200
    const limit = val => Math.min(val + btnAdjust + factor, 200);

    document.getElementById('resBrand').textContent = brand;
    document.getElementById('resModel').textContent = model;
    document.getElementById('sensiGeneral').textContent = limit(data.general);
    document.getElementById('sensiAim').textContent = limit(data.aim);
    document.getElementById('sensi2x').textContent = limit(data.x2);
    document.getElementById('sensi4x').textContent = limit(data.x4);
    document.getElementById('sensi8x').textContent = limit(data.sniper);
    document.getElementById('sensi360').textContent = limit(data.cam360);

    document.getElementById('resultArea').style.display = 'block';
}

// Exportar configuración JSON
function exportConfig() {
    const config = {
        marca: brandSelect.value,
        modelo: modelSelect.value,
        estilo: document.getElementById('playStyle').value,
        sensibilidades: {
            general: document.getElementById('sensiGeneral').textContent,
            mira_punto_rojo: document.getElementById('sensiAim').textContent,
            mira_x2: document.getElementById('sensi2x').textContent,
            mira_x4: document.getElementById('sensi4x').textContent,
            mira_francotirador: document.getElementById('sensi8x').textContent,
            camara_360: document.getElementById('sensi360').textContent
        }
    };
    const blob = new Blob([JSON.stringify(config, null, 2)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'sensifire-config.json';
    a.click();
}
</script>
</body>
</html>
