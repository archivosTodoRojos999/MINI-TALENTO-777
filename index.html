
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENCIFLIXER - Sensibilidade</title>
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:'Arial',sans-serif;}
body {
    background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 50%, #0f0f0f 100%);
    color: #fff;
    padding: 15px;
    background-image:
      url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><path fill="none" stroke="%23252525" stroke-width="0.5" d="M0,40 C120,0 120,80 240,40 M0,80 C120,40 120,120 240,80 M0,120 C120,80 120,160 240,120 M30,0 C0,30 60,30 30,60 M60,0 C30,30 90,30 60,60"/></svg>'),
      linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 50%, #0f0f0f 100%);
    background-blend-mode: overlay;
    background-size: cover;
    background-position: center;
}
h1 {font-size:22px; text-align:center; margin:20px 0 5px; font-weight:600;}
.subtitle {font-size:13px; color:#d0d0d0; text-align:center; margin-bottom:25px;}
.tabs {display:flex; gap:4px; margin-bottom:22px;}
.tab {flex:1; padding:10px 0; border:1px solid #fff; background:transparent; color:#fff; font-size:15px; cursor:pointer;}
.tab.active {background:#fff; color:#000; font-weight:bold;}
select {width:100%; padding:11px 10px; background:#111; border:1px solid #fff; color:#fff; font-size:15px; margin-bottom:15px; appearance:none; background-image:url('data:image/svg+xml;utf8,<svg fill="%23ffffff" viewBox="0 0 24 24" width="14" height="14"><path d="M7 10l5 5 5-5z"/></svg>'); background-repeat:no-repeat; background-position:right 10px center;}
#gerarBtn, #gerarBtnAux {width:100%; padding:10px 0; background:transparent; border:1px solid #fff; color:#fff; font-size:15px; margin-bottom:22px; cursor:pointer;}
#resultado, #resultadoAux {border:1px solid #fff; padding:12px; background:#111; display:none; border-radius:8px; box-shadow:0 0 15px rgba(0,0,0,0.5);}
#resultado p, #resultadoAux p {font-size:15px; margin:4px 0;}
footer {font-size:11px; color:#b0b0b0; text-align:center; margin-top:30px;}
/* Canvas animado */
#fondoAnimado {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
}
</style>
</head>
<body>

<canvas id="fondoAnimado"></canvas>

<h1>Sensibilidade / Auxílio</h1>
<p class="subtitle">Configure a sensibilidade para usar</p>

<div class="tabs">
    <button class="tab active" id="tabSensi">Sensi</button>
    <button class="tab" id="tabAux">Auxílio</button>
</div>

<!-- Contenido Sensi -->
<div id="conteudoSensi">
    <select id="marca">
        <option value="">Seleccione marca</option>
        <option value="Samsung">Samsung</option>
        <option value="Apple">iPhone</option>
        <option value="Xiaomi">Xiaomi</option>
        <option value="Motorola">Motorola</option>
        <option value="Honor">Honor</option>
        <option value="Poco">Poco</option>
    </select>

    <select id="modelo">
        <option value="">Seleccione modelo</option>
    </select>

    <button id="gerarBtn">Generar Sensi</button>

    <div id="resultado">
        <p>GENERAL: <span id="resGeral">-</span></p>
        <p>MIRA PUNTO ROJO: <span id="resPonto">-</span></p>
        <p>MIRA X2: <span id="res2x">-</span></p>
        <p>MIRA X4: <span id="res4x">-</span></p>
        <p>MIRA FRANCOTIRADOR: <span id="resFrancotirador">-</span></p>
        <p>CAMARA 360: <span id="resCam360">-</span></p>
    </div>
</div>

<!-- Contenido Auxílio -->
<div id="conteudoAux" style="display:none;">
    <select id="marcaAux">
        <option value="">Seleccione marca</option>
        <option value="Samsung">Samsung</option>
        <option value="Apple">iPhone</option>
        <option value="Xiaomi">Xiaomi</option>
        <option value="Motorola">Motorola</option>
        <option value="Honor">Honor</option>
        <option value="Poco">Poco</option>
    </select>

    <select id="modeloAux">
        <option value="">Seleccione modelo</option>
    </select>

    <button id="gerarBtnAux">Generar Auxílio</button>

    <div id="resultadoAux">
        <p>GENERAL: <span id="resGeralAux">-</span></p>
        <p>MIRA PUNTO ROJO: <span id="resPontoAux">-</span></p>
        <p>MIRA X2: <span id="res2xAux">-</span></p>
        <p>MIRA X4: <span id="res4xAux">-</span></p>
        <p>MIRA FRANCOTIRADOR: <span id="resFrancotiradorAux">-</span></p>
        <p>CAMARA 360: <span id="resCam360Aux">-</span></p>
    </div>
</div>

<footer>
    Desenvolvido por @ @nexus.sensix
</footer>

<script>
// Modelos más conocidos
const todosCelulares = {
  "Samsung":[
    {nome:"Galaxy S23", geral:98, ponto:105, mira2x:160, mira4x:130, francotirador:120, cam360:100},
    {nome:"Galaxy S22", geral:97, ponto:104, mira2x:159, mira4x:129, francotirador:118, cam360:98},
    {nome:"Galaxy A54", geral:102, ponto:108, mira2x:164, mira4x:133, francotirador:122, cam360:102},
    {nome:"Galaxy Z Fold 5", geral:102, ponto:108, mira2x:164, mira4x:134, francotirador:122, cam360:102}
  ],
  "Apple":[
    {nome:"iPhone 15", geral:97, ponto:102, mira2x:158, mira4x:128, francotirador:118, cam360:98},
    {nome:"iPhone 14", geral:95, ponto:100, mira2x:156, mira4x:126, francotirador:116, cam360:96},
    {nome:"iPhone 13", geral:94, ponto:99, mira2x:155, mira4x:125, francotirador:115, cam360:95}
  ],
  "Xiaomi":[
    {nome:"Redmi Note 12", geral:96, ponto:103, mira2x:158, mira4x:130, francotirador:116, cam360:96},
    {nome:"Mi 13", geral:98, ponto:105, mira2x:160, mira4x:132, francotirador:120, cam360:100}
  ],
  "Motorola":[
    {nome:"Edge 40", geral:97, ponto:104, mira2x:159, mira4x:130, francotirador:118, cam360:98},
    {nome:"Moto G Power 2023", geral:95, ponto:101, mira2x:156, mira4x:127, francotirador:115, cam360:95}
  ],
  "Honor":[
    {nome:"Magic 5 Lite", geral:96, ponto:103, mira2x:158, mira4x:130, francotirador:116, cam360:96},
    {nome:"X8a", geral:95, ponto:102, mira2x:157, mira4x:129, francotirador:115, cam360:95}
  ],
  "Poco":[
    {nome:"X5 Pro", geral:97, ponto:104, mira2x:159, mira4x:131, francotirador:118, cam360:98},
    {nome:"F4", geral:98, ponto:105, mira2x:160, mira4x:132, francotirador:120, cam360:100}
  ]
};

// Auxílio +20
const todosCelularesAux = {};
for (let marca in todosCelulares){
  todosCelularesAux[marca] = todosCelulares[marca].map(c=>({
    nome:c.nome,
    geral:c.geral+20,
    ponto:c.ponto+20,
    mira2x:c.mira2x+20,
    mira4x:c.mira4x+20,
    francotirador:c.francotirador+20,
    cam360:c.cam360+20
  }));
}

// Sensi
const marcaSelect=document.getElementById("marca");
const modeloSelect=document.getElementById("modelo");
marcaSelect.addEventListener("change",()=>{
  const marca=marcaSelect.value;
  modeloSelect.innerHTML='<option value="">Seleccione modelo</option>';
  if(todosCelulares[marca]) todosCelulares[marca].forEach(c=>{
    const option=document.createElement("option"); option.value=c.nome; option.textContent=c.nome; modeloSelect.appendChild(option);
  });
});
document.getElementById("gerarBtn").addEventListener("click",()=>{
  const marca=marcaSelect.value; const modelo=modeloSelect.value;
  if(!marca||!modelo)return alert("Seleccione marca y modelo!");
  const cel=todosCelulares[marca].find(c=>c.nome===modelo);
  if(cel){
    document.getElementById("resGeral").textContent=cel.geral;
    document.getElementById("resPonto").textContent=cel.ponto;
    document.getElementById("res2x").textContent=cel.mira2x;
    document.getElementById("res4x").textContent=cel.mira4x;
    document.getElementById("resFrancotirador").textContent=cel.francotirador;
    document.getElementById("resCam360").textContent=cel.cam360;
    document.getElementById("resultado").style.display="block";
  }
});

// Auxílio
const marcaAux=document.getElementById("marcaAux");
const modeloAux=document.getElementById("modeloAux");
marcaAux.addEventListener("change",()=>{
  const marca=marcaAux.value;
  modeloAux.innerHTML='<option value="">Seleccione modelo</option>';
  if(todosCelularesAux[marca]) todosCelularesAux[marca].forEach(c=>{
    const option=document.createElement("option"); option.value=c.nome; option.textContent=c.nome; modeloAux.appendChild(option);
  });
});
document.getElementById("gerarBtnAux").addEventListener("click",()=>{
  const marca=marcaAux.value; const modelo=modeloAux.value;
  if(!marca||!modelo)return alert("Seleccione marca y modelo!");
  const cel=todosCelularesAux[marca].find(c=>c.nome===modelo);
  if(cel){
    document.getElementById("resGeralAux").textContent=cel.geral;
    document.getElementById("resPontoAux").textContent=cel.ponto;
    document.getElementById("res2xAux").textContent=cel.mira2x;
    document.getElementById("res4xAux").textContent=cel.mira4x;
    document.getElementById("resFrancotiradorAux").textContent=cel.francotirador;
    document.getElementById("resCam360Aux").textContent=cel.cam360;
    document.getElementById("resultadoAux").style.display="block";
  }
});

// Pestañas
const tabSensi=document.getElementById("tabSensi");
const tabAux=document.getElementById("tabAux");
const conteudoSensi=document.getElementById("conteudoSensi");
const conteudoAux=document.getElementById("conteudoAux");
tabSensi.addEventListener("click",()=>{
  tabSensi.classList.add("active"); tabAux.classList.remove("active");
  conteudoSensi.style.display="block"; conteudoAux.style.display="none";
});
tabAux.addEventListener("click",()=>{
  tabAux.classList.add("active"); tabSensi.classList.remove("active");
  conteudoSensi.style.display="none"; conteudoAux.style.display="block";
});

// Animación fondo
const canvas = document.getElementById('fondoAnimado');
const ctx = canvas.getContext('2d');
let w, h;
function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

const particulas = [];
for(let i=0;i<100;i++){
    particulas.push({
        x: Math.random()*w,
        y: Math.random()*h,
        vx: (Math.random()-0.5)*0.3,
        vy: (Math.random()-0.5)*0.3,
        size: Math.random()*2+1
    });
}

// Animación de partículas coloridas
const canvas = document.getElementById('fondoAnimado');
const ctx = canvas.getContext('2d');
let w, h;
function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

// Colores variados para partículas
const colores = ['#ff3c3c','#3cff7f','#3c8cff','#ffde3c','#ff3cff','#3cfff3'];

const particulas = [];
for(let i=0;i<100;i++){
    particulas.push({
        x: Math.random()*w,
        y: Math.random()*h,
        vx: (Math.random()-0.5)*0.3,
        vy: (Math.random()-0.5)*0.3,
        size: Math.random()*2+1,
        color: colores[Math.floor(Math.random()*colores.length)]
    });
}

function animar(){
    ctx.clearRect(0,0,w,h);
    for(let p of particulas){
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fillStyle=p.color + '33'; // transparencia suave
        ctx.fill();
        p.x += p.vx;
        p.y += p.vy;
        if(p.x<0) p.x=w; if(p.x>w) p.x=0;
        if(p.y<0) p.y=h; if(p.y>h) p.y=0;
    }
    requestAnimationFrame(animar);
}
animar();
</script>

</body>
</html>
