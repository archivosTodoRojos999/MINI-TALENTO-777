body {

    font-size: 22px;
    text-align: center;
    margin: 20px 0 5px 0;
    font-weight: 600;
}
.subtitle {
    font-size: 13px;
    color: #d0d0d0;
    text-align: center;
    margin-bottom: 25px;
}
.tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 22px;
}
.tab {
    flex: 1;
    padding: 10px 0;
    border: 1px solid #fff;
    background: transparent;
    color: #fff;
    font-size: 15px;
    cursor: pointer;
}
.tab.active {
    background: #fff;
    color: #000;
    font-weight: bold;
}
select {
    width: 100%;
    padding: 11px 10px;
    background: #111;
    border: 1px solid #fff;
    color: #fff;
    font-size: 15px;
    margin-bottom: 15px;
    appearance: none;
    background-image: url('data:image/svg+xml;utf8,<svg fill="%23ffffff" viewBox="0 0 24 24" width="14" height="14"><path d="M7 10l5 5 5-5z"/></svg>');
    background-repeat: no-repeat;
    background-position: right 10px center;
}
#gerarBtn {
    width: 100%;
    padding: 10px 0;
    background: transparent;
    border: 1px solid #fff;
    color: #fff;
    font-size: 15px;
    margin-bottom: 22px;
    cursor: pointer;
}
#resultado {
    border: 1px solid #fff;
    padding: 12px;
    background: #111;
    display: none;
}
#resultado p {
    font-size: 15px;
    margin: 4px 0;
}
footer {
    font-size: 11px;
    color: #b0b0b0;
    text-align: center;
    margin-top: 30px;
}
</style>
</head>
<body>

<h1>Sensibilidade / Auxílio</h1>
<p class="subtitle">Configure a sensibilidade para usar</p>

<div class="tabs">
    <button class="tab active" id="tabSensi">Sensi</button>
    <button class="tab" id="tabAux">Auxílio</button>
</div>

<div id="conteudoSensi">
    <select id="marca">
        <option value="">Selecione</option>
        <option value="Samsung">Samsung</option>
        <option value="Apple">iPhone</option>
        <option value="Xiaomi">Xiaomi</option>
        <option value="Motorola">Motorola</option>
        <option value="Oppo">Oppo</option>
        <option value="Vivo">Vivo</option>
        <option value="Lenovo">Lenovo</option>
        <option value="LG">LG</option>
        <option value="Nokia">Nokia</option>
        <option value="Honor">Honor</option>
    </select>

    <select id="modelo">
        <option value="">Selecione</option>
    </select>

    <button id="gerarBtn">Generar senci</button>

    <div id="resultado">
        <p>Modelo: <span id="resModelo">-</span></p>
        <p>Geral: <span id="resGeral">-</span></p>
        <p>Ponto Vermelho: <span id="resPonto">-</span></p>
        <p>Mira 2x: <span id="res2x">-</span></p>
        <p>Mira 4x: <span id="res4x">-</span></p>
        <p>Tamanho do Botão: <span id="resBotao">-</span></p>
    </div>
</div>

<div id="conteudoAux" style="display: none;">
    <p style="text-align: center; padding: 40px 10px; font-size: 15px;">Conteúdo em desenvolvimento</p>
</div>

<footer>
