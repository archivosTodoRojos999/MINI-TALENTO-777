<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SENCIFLIXER – Generador de Sensibilidades</title>
<style>
body {
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #2a2a3c);
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    min-height: 100vh;
}
h1 { color: #ff4d4d; font-size: 32px; margin-bottom:5px; text-align:center;}
h2 { color: #ff9999; margin-bottom: 20px; text-align:center;}
input, select, button { padding: 10px; margin: 5px; border-radius: 8px; border: none; font-size:16px; width: 100%; max-width: 300px; }
button { background-color:#ff4d4d; color:white; cursor:pointer; transition:0.3s; }
button:hover { background-color:#ff1a1a; }
#authArea { margin-top:50px; text-align:center; }
#mainContent { display:none; width:100%; max-width:400px; }
#resultArea { margin-top:20px; padding:20px; background-color:#3a3a5a; border-radius:12px; text-align:left; }
span.sensi-value { font-weight:bold; color:#ffcc00; }
footer { margin-top:30px; font-size:12px; color:#aaa; text-align:center;}
</style>
</head>
<body>

<!-- Login -->
<div id="authArea">
    <h1>Acceso SENCIFLIXER</h1>
    <input type="text" id="username" placeholder="Usuario"><br>
    <input type="password" id="password" placeholder="Clave"><br>
    <button onclick="checkLogin()">Entrar</button>
    <p id="errorMsg" style="color:red; display:none;">Usuario o clave incorrecta</p>
</div>

<!-- Contenido principal -->
<div id="mainContent">
    <h1>SENCIFLIXER</h1>
    <h2>Generador de sensibilidades profesional</h2>

    <label>Marca del celular:</label>
    <select id="brandSelect">
        <option value="">Cargando marcas...</option>
    </select>

    <label>Modelo del celular:</label>
    <select id="modelSelect">
        <option value="">Selecciona el modelo</option>
    </select>

    <label>Estilo de juego:</label>
    <select id="playStyle">
        <option value="sniper">Sniper</option>
        <option value="support">Support</option>
        <option value="competitive">Competitive</option>
    </select>

    <label>Ajuste general (+/-):</label>
    <input type="number" id="btnAdjust" value="0">

    <button onclick="calculateSens()">Generar Senci</button>

    <div id="resultArea" style="display:none;">
        <p>Marca: <span id="resBrand"></span></p>
        <p>Modelo: <span id="resModel"></span></p>
        <p>General: <span id="sensiGeneral" class="sensi-value"></span></p>
        <p>Mira: <span id="sensiAim" class="sensi-value"></span></p>
        <p>2x: <span id="sensi2x" class="sensi-value"></span></p>
        <p>4x: <span id="sensi4x" class="sensi-value"></span></p>
        <p>8x/AWM: <span id="sensi8x" class="sensi-value"></span></p>
        <p>Nocturna: <span id="sensiNight" class="sensi-value"></span></p>
        <p>Térmica: <span id="sensiThermal" class="sensi-value"></span></p>
        <p>Automático: <span id="sensiAuto" class="sensi-value"></span></p>
    </div>

    <button onclick="exportConfig()">Exportar Configuración</button>
</div>

<footer>
    Desarrollado por @nexus.sensix
</footer>

<script>
// Login
function checkLogin() {
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    if(user === '22' && pass === '22') {
        document.getElementById('authArea').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
    } else {
        document.getElementById('errorMsg').style.display = 'block';
    }
}

// Dispositivos con marcas y modelos
const dispositivos = {
    "Samsung": ["Galaxy S23","Galaxy A53","Galaxy A22"],
    "Apple": ["iPhone 14","iPhone 14 Pro","iPhone 13"],
    "Motorola": ["G20","Edge 30","G60"],
    "Xiaomi": ["Redmi Note 11","Mi 12","Redmi Note 10"],
    "Huawei": ["P50","Mate 40"],
    "Oppo": ["Reno 8","Find X5"],
    "Vivo": ["V23","X80 Pro"],
    "OnePlus": ["10 Pro","Nord 2"],
    "Realme": ["GT 2","Narzo 50"],
    "Nokia": ["G21","X20"],
    "LG": ["Velvet","Wing"],
    "Sony": ["Xperia 1","Xperia 5"],
    "Asus": ["ROG Phone 6","Zenfone 9"],
    "Lenovo": ["Legion Phone Duel 2","K12"],
    "ZTE": ["Axon 30","Blade V30"],
    "Alcatel": ["1S","3L"],
    "Meizu": ["18s","M16th"],
    "Honor": ["50","Magic4"],
    "HTC": ["Desire 22","U20"],
    "Google": ["Pixel 7","Pixel 6"]
};

// Llenar primer select (marcas)
const brandSelect = document.getElementById('brandSelect');
const modelSelect = document.getElementById('modelSelect');

brandSelect.innerHTML = '<option value="">Selecciona la marca</option>';
Object.keys(dispositivos).forEach(brand => {
    const opt = document.createElement('option');
    opt.value = brand;
    opt.textContent = brand;
    brandSelect.appendChild(opt);
});

// Llenar segundo select según marca
brandSelect.addEventListener('change', () => {
    const marca = brandSelect.value;
    modelSelect.innerHTML = '<option value="">Selecciona el modelo</option>';
    if(dispositivos[marca]) {
        dispositivos[marca].forEach(model => {
            const opt = document.createElement('option');
            opt.value = model;
            opt.textContent = model;
            modelSelect.appendChild(opt);
        });
    }
});

// Generar sensibilidades
function calculateSens() {
    const baseGen = 50;
    const baseAim = 30;
    const btnAdjust = parseInt(document.getElementById('btnAdjust').value) || 0;
    const style = document.getElementById('playStyle').value;
    const brand = brandSelect.value;
    const model = modelSelect.value;

    if(!brand || !model) { alert("Selecciona marca y modelo"); return; }

    let sensiGeneral, sensiAim, sensi2x, sensi4x, sensi8x, sensiNight, sensiThermal, sensiAuto;
    switch(style) {
        case 'sniper':
            sensiGeneral = baseGen + btnAdjust - 3;
            sensiAim = baseAim + btnAdjust - 4;
            sensi2x = 28 + btnAdjust;
            sensi4x = 20 + btnAdjust;
            sensi8x = 12 + btnAdjust;
            sensiNight = 35 + btnAdjust;
            sensiThermal = 28 + btnAdjust;
            sensiAuto = 25 + btnAdjust;
            break;
        case 'support':
            sensiGeneral = baseGen + btnAdjust;
            sensiAim = baseAim + btnAdjust;
            sensi2x = 35 + btnAdjust;
            sensi4x = 28 + btnAdjust;
            sensi8x = 18 + btnAdjust;
            sensiNight = 42 + btnAdjust;
            sensiThermal = 34 + btnAdjust;
            sensiAuto = 32 + btnAdjust;
            break;
        case 'competitive':
            sensiGeneral = baseGen + btnAdjust + 2;
            sensiAim = baseAim + btnAdjust + 1;
            sensi2x = 38 + btnAdjust;
            sensi4x = 32 + btnAdjust;
            sensi8x = 22 + btnAdjust;
            sensiNight = 45 + btnAdjust;
            sensiThermal = 37 + btnAdjust;
            sensiAuto = 35 + btnAdjust;
            break;
    }

    document.getElementById('resBrand').textContent = brand;
    document.getElementById('resModel').textContent = model;
    document.getElementById('sensiGeneral').textContent = sensiGeneral;
    document.getElementById('sensiAim').textContent = sensiAim;
    document.getElementById('sensi2x').textContent = sensi2x;
    document.getElementById('sensi4x').textContent = sensi4x;
    document.getElementById('sensi8x').textContent = sensi8x;
    document.getElementById('sensiNight').textContent = sensiNight;
    document.getElementById('sensiThermal').textContent = sensiThermal;
    document.getElementById('sensiAuto').textContent = sensiAuto;
    document.getElementById('resultArea').style.display = 'block';
}

// Exportar configuración JSON
function exportConfig() {
    const config = {
        marca: brandSelect.value,
        modelo: modelSelect.value,
        estilo: document.getElementById('playStyle').value,
        sensibilidades: {
            general: document.getElementById('sensiGeneral').textContent,
            mira: document.getElementById('sensiAim').textContent,
            '2x': document.getElementById('sensi2x').textContent,
            '4x': document.getElementById('sensi4x').textContent,
            '8x/AWM': document.getElementById('sensi8x').textContent,
            nocturna: document.getElementById('sensiNight').textContent,
            termica: document.getElementById('sensiThermal').textContent,
            automatico: document.getElementById('sensiAuto').textContent
        }
    };
    const blob = new Blob([JSON.stringify(config, null, 2)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'sensifire-config.json';
    a.click();
}
</script>
</body>
</html>
